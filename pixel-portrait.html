<style>
  :root {
    --bg: #1a1a1a; --fg: #d4c9a8; --fg-dim: #888070; --line: #2a2a2a;
    --bubble-fill: #fefbf3;
    --bubble-border: #1a1a1a;
    --bubble-text: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--fg);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(12px, 4vw, 32px); overflow: hidden;
  }
  .frame {
    padding: clamp(8px, 2vw, 16px);
    position: relative;
  }
  .canvas-wrap {
    position: relative;
    width: min(68vmin, 576px);
    height: min(68vmin, 576px);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  /* === Hover zone overlay — only over characters (matches character bbox) === */
  .hotzone {
    position: absolute;
    top: 4%;
    left: 23%;
    width: 53%;
    height: 91%;
    z-index: 5;
    cursor: pointer;
    /* uncomment to debug: */
    /* background: rgba(255, 0, 0, 0.2); */
  }

  /* === Designer bubble — pushed UP (top -32) so text is fully visible === */
  .bubble {
    position: absolute;
    top: -72px;
    left: clamp(40px, 12%, 140px);
    width: clamp(240px, 42vmin, 380px);
    aspect-ratio: 80 / 42;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transform-origin: 72% 95%;
    transform: scale(0) translateY(8px);
    transition: opacity 100ms steps(3), transform 200ms steps(4);
  }
  .heart-bubble {
    position: absolute;
    top: clamp(60px, 11%, 110px);
    left: clamp(130px, 26%, 290px);
    width: clamp(90px, 16vmin, 130px);
    aspect-ratio: 1 / 1;
    pointer-events: none;
    z-index: 11;
    opacity: 0;
    transform-origin: 85% 95%;
    transform: scale(0) translateY(8px);
    transition: opacity 100ms steps(3), transform 240ms steps(5);
  }

  .frame.show-bubble .bubble {
    opacity: 1;
    transform: scale(1) translateY(0);
    transition-delay: 0ms;
    animation: float 1.6s steps(4) 0.3s infinite;
  }
  .frame.show-bubble .heart-bubble {
    opacity: 1;
    transform: scale(1) translateY(0);
    transition-delay: 180ms;
    animation: floatHeart 1.4s steps(4) 0.5s infinite;
  }

  @keyframes float {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1) translateY(-3px); }
  }
  @keyframes floatHeart {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.05) translateY(-4px); }
  }

  .bubble-svg, .heart-svg {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    display: block;
  }

  .bubble-text {
    position: absolute;
    inset: 14% 14% 42% 14%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Silkscreen', monospace;
    font-weight: 700;
    font-size: clamp(18px, 3.4vmin, 28px);
    line-height: 1.05;
    letter-spacing: 0.05em;
    color: var(--bubble-text);
    text-align: center;
    pointer-events: none;
    text-shadow: 1px 0 0 currentColor, 0 1px 0 currentColor;
  }

  .title {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--fg-dim); margin-bottom: 12px;
  }
</style>

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const W = 256, H = 256;
const paletteRGB = PALETTE.map(c => [
  parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)
]);

const baseImg = ctx.createImageData(W, H);
for (let y = 0; y < H; y++) {
  for (let x = 0; x < W; x++) {
    const idx = BASE[y][x];
    const i = (y * W + x) * 4;
    if (idx === TRANSPARENT_IDX) baseImg.data[i+3] = 0;
    else {
      const rgb = paletteRGB[idx];
      baseImg.data[i] = rgb[0]; baseImg.data[i+1] = rgb[1]; baseImg.data[i+2] = rgb[2]; baseImg.data[i+3] = 255;
    }
  }
}

const frame = ctx.createImageData(W, H);
function applyChanges(flat) {
  for (let k = 0; k < flat.length; k += 3) {
    const x = flat[k], y = flat[k+1], idx = flat[k+2];
    const i = (y * W + x) * 4;
    if (idx === TRANSPARENT_IDX) frame.data[i+3] = 0;
    else {
      const rgb = paletteRGB[idx];
      frame.data[i] = rgb[0]; frame.data[i+1] = rgb[1]; frame.data[i+2] = rgb[2]; frame.data[i+3] = 255;
    }
  }
}

const STATE_DATA = {
  guy_half: GUY_HALF, guy_full: GUY_FULL,
  girl_half: GIRL_HALF, girl_full: GIRL_FULL,
  look_50: LOOK_50, look_100: LOOK_100,
  expr_50: EXPR_50, expr_100: EXPR_100,
};

function renderFrame(t) {
  frame.data.set(baseImg.data);
  const state = SCHEDULE[t];
  if (state !== 'default') applyChanges(STATE_DATA[state]);
  ctx.putImageData(frame, 0, 0);
}

let playing = true, t = 0;
const FPS = 24;
const FRAME_MS = 1000 / FPS;
let lastTime = 0;

function tick(now) {
  if (!lastTime) lastTime = now;
  if (now - lastTime >= FRAME_MS) {
    renderFrame(t);
    t = (t + 1) % N_FRAMES;
    lastTime = now;
  }
  if (playing) requestAnimationFrame(tick);
}
renderFrame(0); t = 1;
requestAnimationFrame(tick);


// === Hover zone: only over characters ===
const frameEl = document.getElementById('frame');
const hotzone = document.getElementById('hotzone');

hotzone.addEventListener('mouseenter', () => frameEl.classList.add('show-bubble'));
hotzone.addEventListener('mouseleave', () => frameEl.classList.remove('show-bubble'));

// Touch: tap toggles
hotzone.addEventListener('touchstart', (e) => {
  frameEl.classList.toggle('show-bubble');
  e.preventDefault();
}, { passive: false });
