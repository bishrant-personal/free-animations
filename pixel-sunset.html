<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Bishrant Tandukar">
<meta name="title" content="Pixel Sunset Beach">
<meta name="description" content="Animated pixel art beach scene with rolling waves, drifting clouds, birds, crabs, jellyfish, and bioluminescent ocean. Includes a day/night toggle that smoothly transitions the full scene.">
<meta name="category" content="Scenes">
<meta name="tags" content="pixel,beach,sunset,ocean,waves,day-night,canvas,animation,nature,clouds">
<title>Pixel Sunset Beach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: #0d0d14;
    overflow: hidden;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }
  .scene-wrap {
    width: 100%; height: 100vh;
    position: relative;
  }
  /* ── CRT RETRO OVERLAY ─────────────────────────────────────────
     Glass-and-phosphor layer stack above the whole scene, like the
     animation is playing on an old tube television (no frame, just
     the screen character):
       .crt-rgb       — vertical RGB phosphor stripes (aperture grille)
       .crt-scanlines — horizontal raster lines with interlace roll
       .crt-rollbar   — slow bright band travelling down the screen
       .crt-vignette  — strong tube-glass corner falloff + glare
       #crtOverlay    — whole-stack phosphor flicker
     All layers are pointer-events: none so taps pass through. */
  #beach {
    /* phosphors run hot: small contrast & saturation push */
    filter: contrast(1.07) brightness(1.03) saturate(1.16);
  }
  #crtOverlay, #crtOverlay > div {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  #crtOverlay {
    z-index: 5;
    animation: crtFlicker 3.2s steps(1) infinite;
  }
  .crt-rgb {
    background: repeating-linear-gradient(
      to right,
      rgba(255, 60, 60, 0.055) 0px,  rgba(255, 60, 60, 0.055) 1px,
      rgba(60, 255, 90, 0.045) 1px,  rgba(60, 255, 90, 0.045) 2px,
      rgba(70, 110, 255, 0.060) 2px, rgba(70, 110, 255, 0.060) 3px
    );
  }
  .crt-scanlines {
    background: repeating-linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0.26) 0px, rgba(0, 0, 0, 0.26) 2px,
      rgba(0, 0, 0, 0.00) 2px, rgba(0, 0, 0, 0.00) 5px
    );
    animation: crtScanRoll 0.9s linear infinite;
  }
  .crt-rollbar {
    background: linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0)    0%,
      rgba(255, 255, 255, 0.05) 38%,
      rgba(255, 255, 255, 0.09) 50%,
      rgba(255, 255, 255, 0.05) 62%,
      rgba(0, 0, 0, 0.06)       78%,
      rgba(0, 0, 0, 0)          100%
    );
    height: 24vh;
    inset: auto 0;
    mix-blend-mode: screen;
    animation: crtRollbar 7s linear infinite;
  }
  .crt-vignette {
    background:
      /* glass glare, upper-left */
      radial-gradient(ellipse 60% 38% at 28% 12%,
        rgba(210, 225, 255, 0.10) 0%,
        rgba(210, 225, 255, 0.03) 55%,
        rgba(210, 225, 255, 0) 100%),
      /* tube corner falloff */
      radial-gradient(ellipse 75% 65% at 50% 50%,
        rgba(0, 0, 0, 0)        46%,
        rgba(0, 0, 0, 0.08)     64%,
        rgba(0, 0, 0, 0.22)     80%,
        rgba(2, 1, 8, 0.45)     92%,
        rgba(2, 1, 8, 0.66)    100%);
  }
  @keyframes crtScanRoll {
    from { background-position: 0 0; }
    to   { background-position: 0 5px; }
  }
  @keyframes crtRollbar {
    from { transform: translateY(-26vh); }
    to   { transform: translateY(102vh); }
  }
  @keyframes crtFlicker {
    0%    { opacity: 1.00; }
    7%    { opacity: 0.92; }
    9%    { opacity: 1.00; }
    31%   { opacity: 0.96; }
    33%   { opacity: 1.00; }
    52%   { opacity: 0.90; }
    54%   { opacity: 1.00; }
    71%   { opacity: 0.95; }
    73%   { opacity: 1.00; }
    100%  { opacity: 1.00; }
  }
  /* ── Analog signal noise: fine static grain boiling over the picture.
        One noise tile (generated by JS at init), background-position
        jumped around at ~12fps so the grain shimmers like TV snow. ── */
  .crt-noise {
    background-repeat: repeat;
    opacity: 0.055;
    animation: crtNoise 0.65s steps(8) infinite;
  }
  @keyframes crtNoise {
    0%   { background-position: 0 0; }
    12.5%{ background-position: -97px 53px; }
    25%  { background-position: 61px -118px; }
    37.5%{ background-position: -34px -71px; }
    50%  { background-position: 122px 89px; }
    62.5%{ background-position: -150px 14px; }
    75%  { background-position: 43px 127px; }
    87.5%{ background-position: -88px -45px; }
    100% { background-position: 0 0; }
  }
  /* ── Horizontal sync wobble: rare brief judder of the whole picture,
        like the tube momentarily losing horizontal hold ── */
  #beach.sync-wobble {
    animation: crtSyncWobble 0.28s steps(2) infinite;
  }
  @keyframes crtSyncWobble {
    0%   { transform: translateX(0); }
    25%  { transform: translateX(-3px); }
    50%  { transform: translateX(2px); }
    75%  { transform: translateX(-1px); }
    100% { transform: translateX(0); }
  }
  /* ── CRT glitch tears: random horizontal colour-split lines that
        appear, slip once, then heal (driven by JS scheduler) ── */
  .crt-glitch {
    position: absolute; left: 0; right: 0;
    height: 3px; top: -10%;
    opacity: 0;
    pointer-events: none;
    /* No blend mode: saturated colour band + dark lower fringe stays
       visible over the bright day sky AND the dark night scene. */
    background:
      linear-gradient(180deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(10, 6, 24, 0.30) 100%),
      linear-gradient(90deg,
        rgba(0,0,0,0) 0%,
        rgba(255, 40, 90, 0.45) 12%,
        rgba(0, 255, 220, 0.40) 38%,
        rgba(255, 255, 255, 0.28) 55%,
        rgba(80, 120, 255, 0.45) 76%,
        rgba(0,0,0,0) 100%);
  }
  /* ── Defocus pulse: occasionally the whole picture goes soft and blooms
        for a couple seconds, then snaps back — like a tube losing focus.
        Keyframes carry the base filter so it cleanly reverts afterward. ── */
  #beach.crt-defocus {
    animation: crtDefocus var(--defocus-dur, 2.6s) ease-in-out;
  }
  @keyframes crtDefocus {
    0%, 100% { filter: contrast(1.07) brightness(1.03) saturate(1.16) blur(0px); }
    38%      { filter: contrast(1.00) brightness(1.07) saturate(1.26) blur(0.8px); }
    58%      { filter: contrast(1.00) brightness(1.08) saturate(1.28) blur(1.0px); }
  }
  /* ── Chroma band: a soft multi-colour line that rolls in occasionally,
        like colour sync drifting. Wider & blurrier than the sharp tears. ── */
  .crt-chroma {
    position: absolute; left: -2%; right: -2%;
    height: 46px; top: 0;
    opacity: 0;
    pointer-events: none;
    background: linear-gradient(180deg,
      rgba(255, 40, 60, 0)    0%,
      rgba(255, 40, 60, 0.17) 20%,
      rgba(255, 225, 50, 0.13) 40%,
      rgba(70, 255, 130, 0.12) 58%,
      rgba(70, 170, 255, 0.16) 76%,
      rgba(190, 80, 255, 0.17) 90%,
      rgba(190, 80, 255, 0)  100%);
    filter: blur(3px);
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }
  .crt-chroma.run {
    animation: crtChroma var(--chroma-dur, 2.6s) linear;
  }
  @keyframes crtChroma {
    0%   { transform: translateY(var(--chroma-from, -16vh)); opacity: 0; }
    16%  { opacity: 0.52; }
    84%  { opacity: 0.42; }
    100% { transform: translateY(var(--chroma-to, 114vh)); opacity: 0; }
  }
  /* ── Tap hint: retro pixel banner, top-left. Fades in on load, stays
        until the user's first tap, then fades out for good. ── */
  #tapHint {
    position: absolute; top: 18px; left: 18px;
    z-index: 10;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255, 240, 200, 0.95);
    text-shadow: 2px 2px 0 rgba(10, 8, 30, 0.85);
    background: rgba(15, 22, 42, 0.80);
    border: 3px solid rgba(255, 250, 220, 0.40);
    clip-path: var(--pixel-corners);
    padding: 12px 14px;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  #tapHint.show { opacity: 1; }
  /* ── Pixel-art UI ──
     Buttons get stepped "pixel rounded" corners; icons are 7×7 sprites
     painted with box-shadow (3px per pixel) in currentColor, so the
     existing JS colour toggles restyle them automatically. */
  :root {
    --pixel-corners: polygon(
      0 6px, 6px 6px, 6px 0,
      calc(100% - 6px) 0, calc(100% - 6px) 6px, 100% 6px,
      100% calc(100% - 6px), calc(100% - 6px) calc(100% - 6px),
      calc(100% - 6px) 100%, 6px 100%, 6px calc(100% - 6px),
      0 calc(100% - 6px));
  }
  .px-icon {
    display: block;
    width: 4px; height: 4px;
    background: transparent;
  }
  /* sun: solid 3×3 disc with 8 detached rays */
  .icon-sun {
    box-shadow:
      0 -12px, -8px -8px, 8px -8px,
      -4px -4px, 0 -4px, 4px -4px,
      -12px 0, -4px 0, 0 0, 4px 0, 12px 0,
      -4px 4px, 0 4px, 4px 4px,
      -8px 8px, 8px 8px,
      0 12px;
  }
  /* moon: crescent open to the right */
  .icon-moon {
    box-shadow:
      0 -12px, 4px -12px, 8px -12px,
      -4px -8px, 0 -8px,
      -8px -4px, -4px -4px,
      -8px 0, -4px 0,
      -8px 4px, -4px 4px,
      -4px 8px, 0 8px,
      0 12px, 4px 12px, 8px 12px;
  }
  /* eighth note: stem, flag, solid head */
  .icon-note {
    box-shadow:
      4px -12px,
      4px -8px, 8px -8px,
      4px -4px, 12px -4px,
      4px 0,
      4px 4px,
      -8px 8px, -4px 8px, 0 8px, 4px 8px,
      -4px 12px, 0 12px;
  }
</style>
</head>
<body>
<div class="scene-wrap">
<div style="position: relative; width: 100%; height: 100vh;">
  <canvas id="beach" width="720" height="420"
    style="width: 100%; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; display: block; object-fit: fill;">
  </canvas>
  <div id="crtOverlay" aria-hidden="true">
    <div class="crt-rgb"></div>
    <div class="crt-scanlines"></div>
    <div class="crt-noise"></div>
    <div class="crt-rollbar"></div>
    <div class="crt-vignette"></div>
  </div>
  <div id="tapHint" aria-hidden="true">TAP AROUND TO INTERACT</div>
  <button id="dnToggle" aria-label="Toggle day and night" style="
    position: absolute; top: 16px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(15, 22, 42, 0.85);
    border: 3px solid rgba(255, 250, 220, 0.45);
    clip-path: var(--pixel-corners);
    color: rgba(255, 235, 175, 0.95);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; padding: 0;
    transition: background 0.4s, color 0.4s, border-color 0.4s, transform 0.15s;
    z-index: 10;
  "><span id="dnIcon" class="px-icon icon-sun"></span></button>
  <button id="musicToggle" aria-label="Toggle music" style="
    position: absolute; top: 76px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(15, 22, 42, 0.85);
    border: 3px solid rgba(255, 250, 220, 0.30);
    clip-path: var(--pixel-corners);
    color: rgba(220, 220, 235, 0.6);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; padding: 0;
    transition: background 0.4s, color 0.4s, border-color 0.4s, transform 0.15s;
    z-index: 10;
  "><span id="musicIcon" class="px-icon icon-note"></span></button>
  <a id="musicCredit" href="https://github.com/btahir/open-lofi" target="_blank" rel="noopener"
     style="position: absolute; bottom: 10px; right: 14px; z-index: 10;
     font: 10px/1.3 ui-monospace, 'SF Mono', Menlo, monospace;
     color: rgba(255, 255, 255, 0.32); text-decoration: none; text-align: right;
     opacity: 0; transition: opacity 0.5s; pointer-events: auto; user-select: none;">
     ♪ <span id="musicTrackName">Tide Pools at Twilight</span><br>music: Open Lo-Fi (CC0)</a>
</div>
<script>
(function() {
  const canvas = document.getElementById('beach');
  const ctx = canvas.getContext('2d');
  const S = 3;
  const W = 240 * S, H = 140 * S;
  canvas.width = W; canvas.height = H;
  ctx.imageSmoothingEnabled = false;

  const C = {
    sky1:'#3F4F8F', sky2:'#5B5F9E', sky3:'#7F70AE', sky4:'#A77DB5',
    sky5:'#D89BBE', sky6:'#F2BFCB', sky7:'#F8D7C8',
    sun:'#FBE89E', sunCore:'#FFF6CC',
    oceanD:'#1A4C7E', oceanM:'#216898', oceanML:'#2A85B5', oceanL:'#3CA5D0',
    foam:'#FFFFFF', foamM:'#EFF7FB', foamS:'#D8EFF8', foamD:'#A8D0E5', foamE:'#82BFD8',
    washW:'#36C0D5', washM:'#66CEE0', washL:'#A0DBE8',
    wetDeep:'#8A5F48', wetMid:'#9E6E58', wetSand:'#B58270', wetDry:'#C99478',
    bird:'#3A2F4A'
  };

  const NIGHT = {
    foam:'#C0D4E8', foamM:'#A4B8D0', foamS:'#7888A8', foamD:'#4A6080', foamE:'#304664',
    washW:'#263858', washM:'#283450', washL:'#2A3048',
    wetDeep:'#2C2E42', wetMid:'#30323E', wetSand:'#353442', wetDry:'#3A3646'
  };

  // --- OPTIMIZED COLOR MIXING ---
  // Pre-parse all day/night hex constants once
  function parseHex(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  const _PD = { foam:parseHex(C.foam), foamM:parseHex(C.foamM), foamS:parseHex(C.foamS),
                foamD:parseHex(C.foamD), foamE:parseHex(C.foamE),
                washW:parseHex(C.washW), washM:parseHex(C.washM), washL:parseHex(C.washL),
                wetDeep:parseHex(C.wetDeep), wetMid:parseHex(C.wetMid),
                wetSand:parseHex(C.wetSand), wetDry:parseHex(C.wetDry) };
  const _PN = { foam:parseHex(NIGHT.foam), foamM:parseHex(NIGHT.foamM), foamS:parseHex(NIGHT.foamS),
                foamD:parseHex(NIGHT.foamD), foamE:parseHex(NIGHT.foamE),
                washW:parseHex(NIGHT.washW), washM:parseHex(NIGHT.washM), washL:parseHex(NIGHT.washL),
                wetDeep:parseHex(NIGHT.wetDeep), wetMid:parseHex(NIGHT.wetMid),
                wetSand:parseHex(NIGHT.wetSand), wetDry:parseHex(NIGHT.wetDry) };
  const _hex2 = (n) => (n < 16 ? '0' : '') + n.toString(16);
  function mixParsed(a, b, k) {
    return '#' +
      _hex2(Math.round(a[0] + (b[0]-a[0])*k)) +
      _hex2(Math.round(a[1] + (b[1]-a[1])*k)) +
      _hex2(Math.round(a[2] + (b[2]-a[2])*k));
  }
  // Pre-built endpoint arrays (referenced when nightLevel is exactly 0 or 1)
  const DAY_FOAM  = [C.foam, C.foamM, C.foamS, C.foamD, C.foamE];
  const NIGHT_FOAM = [NIGHT.foam, NIGHT.foamM, NIGHT.foamS, NIGHT.foamD, NIGHT.foamE];
  const DAY_WASH  = [C.washW, C.washM, C.washL];
  const NIGHT_WASH = [NIGHT.washW, NIGHT.washM, NIGHT.washL];
  const DAY_WET   = [C.wetDeep, C.wetMid, C.wetSand, C.wetDry];
  const NIGHT_WET  = [NIGHT.wetDeep, NIGHT.wetMid, NIGHT.wetSand, NIGHT.wetDry];

  // --- OPTIMIZED BAYER LOOKUP ---
  const _bayer = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const bayerFlat = new Float32Array(16);
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) bayerFlat[(i<<2)|j] = (_bayer[i][j] + 0.5) / 16;
  const TH = (y, x) => bayerFlat[((y & 3) << 2) | (x & 3)];

  function sandNoise(x, y) {
    return Math.sin(x * 0.155 + y * 0.135 + 0.5) * 0.40
         + Math.sin(x * 0.065 - y * 0.205 + 1.2) * 0.30
         + Math.sin(x * 0.355 + y * 0.295 + 2.3) * 0.20
         + Math.sin(x * 0.565 - y * 0.415 + 3.4) * 0.15;
  }
  function macroNoise(x, y) {
    return Math.sin(x * 0.035 + y * 0.025 + 1.7) * 0.6
         + Math.sin(x * 0.020 - y * 0.030 + 0.3) * 0.5;
  }

  // --- OPTIMIZED FILLSTYLE CACHE ---
  let _curFill = null;
  function setFill(c) {
    if (c !== _curFill) { ctx.fillStyle = c; _curFill = c; }
  }

  let t = 0;
  let nightLevel = 0;
  let targetNight = 0;

  const button = document.getElementById('dnToggle');
  const icon = document.getElementById('dnIcon');
  button.addEventListener('click', () => {
    targetNight = 1 - targetNight;
    icon.className = 'px-icon ' + (targetNight ? 'icon-moon' : 'icon-sun');
    button.style.background = targetNight ? 'rgba(40, 35, 70, 0.75)' : 'rgba(15, 22, 42, 0.72)';
    button.style.color = targetNight ? 'rgba(220, 220, 245, 0.95)' : 'rgba(255, 235, 175, 0.95)';
  });
  button.addEventListener('mousedown', () => { button.style.transform = 'scale(0.92)'; });
  button.addEventListener('mouseup', () => { button.style.transform = 'scale(1)'; });
  button.addEventListener('mouseleave', () => { button.style.transform = 'scale(1)'; });

  // ── RTX lighting (always on) ──
  const rtxLevel = 1;

  // ── Lo-fi soundtrack ──────────────────────────────────────────
  // Tracks from Open Lo-Fi (github.com/btahir/open-lofi), CC0 1.0.
  // Day → "Tide Pools at Twilight", Night → "Starlight in the Sand".
  // Both loop and cross-fade with the day/night transition.
  const MUSIC_VOL = 0.55;
  // Served via jsDelivr (CORS-enabled CDN for GitHub assets) so audio loads
  // wherever the HTML is embedded, not only when served from the repo root.
  const MUSIC_BASE = 'https://cdn.jsdelivr.net/gh/bishrant-personal/free-animations@main/audio/';
  const dayTrack   = new Audio(MUSIC_BASE + 'tide-pools-at-twilight.mp3');
  const nightTrack = new Audio(MUSIC_BASE + 'starlight-in-the-sand.mp3');
  dayTrack.loop = true;   nightTrack.loop = true;
  dayTrack.volume = 0;    nightTrack.volume = 0;
  dayTrack.preload = 'auto'; nightTrack.preload = 'auto';
  dayTrack.crossOrigin = 'anonymous'; nightTrack.crossOrigin = 'anonymous';
  // Start MUTED so browsers permit autoplay even inside sandboxed iframes
  // (bishrant.com/playground uses a sandbox without allow="autoplay"); they
  // unmute on the first user interaction anywhere on the page.
  dayTrack.muted = true; nightTrack.muted = true;
  let musicOn = false;
  const musicBtn    = document.getElementById('musicToggle');
  const musicIcon   = document.getElementById('musicIcon');
  const musicCredit = document.getElementById('musicCredit');
  const musicTrackName = document.getElementById('musicTrackName');

  function applyMusicVolume() {
    if (!musicOn) return;
    const dayL = 1 - nightLevel;
    dayTrack.volume   = Math.max(0, Math.min(1, dayL * MUSIC_VOL));
    nightTrack.volume = Math.max(0, Math.min(1, nightLevel * MUSIC_VOL));
    musicTrackName.textContent = nightLevel > 0.5 ? 'Starlight in the Sand' : 'Tide Pools at Twilight';
  }

  function setMusic(on) {
    musicOn = on;
    if (on) {
      applyMusicVolume();
      // If user has already gestured, this click counts as the unmute trigger.
      if (unmuted) { dayTrack.muted = false; nightTrack.muted = false; }
      dayTrack.play().catch(() => {});
      nightTrack.play().catch(() => {});
      musicBtn.style.borderColor = 'rgba(255, 235, 175, 0.55)';
      musicBtn.style.color = 'rgba(255, 235, 175, 0.95)';
      musicCredit.style.opacity = '1';
    } else {
      dayTrack.pause();
      nightTrack.pause();
      musicBtn.style.borderColor = 'rgba(255, 250, 220, 0.30)';
      musicBtn.style.color = 'rgba(220, 220, 235, 0.6)';
      musicCredit.style.opacity = '0';
    }
  }
  musicBtn.addEventListener('click', e => { e.stopPropagation(); setMusic(!musicOn); });
  musicBtn.addEventListener('mousedown', () => { musicBtn.style.transform = 'scale(0.92)'; });
  musicBtn.addEventListener('mouseup', () => { musicBtn.style.transform = 'scale(1)'; });
  musicBtn.addEventListener('mouseleave', () => { musicBtn.style.transform = 'scale(1)'; });

  // Music on by default. Tracks begin MUTED — browsers always permit muted
  // autoplay, even inside restrictive iframes. On the first real user gesture
  // anywhere on the page we unmute, so playback is already running and just
  // becomes audible. Robust against sandboxed iframes (e.g. bishrant.com/playground).
  let unmuted = false;
  setMusic(true);

  // Tap hint: fade in shortly after load, persists until the first gesture.
  const tapHintEl = document.getElementById('tapHint');
  setTimeout(() => tapHintEl.classList.add('show'), 400);

  const unmute = () => {
    if (unmuted) return;
    unmuted = true;
    tapHintEl.classList.remove('show'); // dismiss the hint on first interaction
    // Tracks are already playing (muted) from setMusic(true), so flipping
    // .muted is instantaneous and the user hears audio with zero delay.
    // play() is re-kicked only as a safety net; we don't await it.
    if (musicOn) {
      // Skip the day track's quiet intro: audible playback starts at 0:02
      if (dayTrack.currentTime < 2) dayTrack.currentTime = 2;
      dayTrack.muted = false;

        for (const cl of set) {

          const xx = (((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width;

  const oceanColors = [C.oceanD, C.oceanM, C.oceanML, C.oceanL];

  const JELLY_LIGHT_RGB = {

  function drawBird(x, y, frame, big) {
    x = Math.floor(x); y = Math.floor(y);

    const blk = (px, py) => ctx.fillRect(px, py, S, S);
    if (!big) {
      if (frame === 0) { blk(x-S, y); blk(x, y); blk(x+S, y); }
      else { blk(x-S, y+S); blk(x, y); blk(x+S, y+S); }
    } else {
      if (frame === 0) { blk(x-2*S, y-S); blk(x-S, y); blk(x, y); blk(x+S, y); blk(x+2*S, y-S); }
      else if (frame === 1) { blk(x-2*S, y); blk(x-S, y); blk(x, y); blk(x+S, y); blk(x+2*S, y); }
      else { blk(x-2*S, y+S); blk(x-S, y+S); blk(x, y); blk(x+S, y+S); blk(x+2*S, y+S); }

  }
  function reflectionRow(cx, y, halfW, col, solidThresh) {
    for (let dx = -halfW - 2; dx <= halfW + 2; dx++) {
      const ax = cx + dx;
      if (ax < 0 || ax >= W) continue;
      const intensity = 1 - Math.abs(dx) / (halfW + 1);
      const th = TH(y, ax);
      if (intensity > solidThresh) { setFill(col); ctx.fillRect(ax, y, 1, 1); }

  const ROCKS = { tiny: ['LMD','.DD'], small: ['.LMD','LMMD','.DDD'], med: ['..LMD.','.LMMMD','LMMMMD','.DDDDD'] };

  function buildRockParticles(type, rx, ry) {
    const s = ROCKS[type];
    const ph = s.length;
    const spread = type === 'med' ? 11 : type === 'small' ? 8 : 5;
    const pts = [];
    for (let py = 0; py < ph; py++) {
      for (let px = 0; px < s[py].length; px++) {
        const ch = s[py][px]; if (ch === '.') continue;
        const col = ch === 'L' ? '#857968' : ch === 'M' ? '#5C5042' : '#3A3024';
        const ox = rx + px * S, oy = ry + py * S;
        pts.push({
          col, ox, oy,
          sx: ox + (Math.random() - 0.5) * spread * S,
          sy: ry + ph * S + Math.random() * S,
          arcH: (0.8 + Math.random() * 1.8) * S,
        });
      }
    }
    return pts;
  }

  const rocks = [
    {type:'med',   x:24*S,  y:122*S, state:'solid', stateStart:0, particles:[]},
    {type:'tiny',  x:32*S,  y:129*S, state:'solid', stateStart:0, particles:[]},
    {type:'small', x:78*S,  y:131*S, state:'solid', stateStart:0, particles:[]},
    {type:'small', x:140*S, y:127*S, state:'solid', stateStart:0, particles:[]},
    {type:'tiny',  x:147*S, y:130*S, state:'solid', stateStart:0, particles:[]},
    {type:'med',   x:200*S, y:124*S, state:'solid', stateStart:0, particles:[]},
  ];

  function drawRocks() {
    const now = performance.now();
    for (const rock of rocks) {
      const s = ROCKS[rock.type];
      let elapsed = now - rock.stateStart;  // let so transitions can reset it

      // ── State transitions ──
      if (rock.state === 'crumbling' && elapsed > 420) {
        rock.state = 'mixing';
        rock.stateStart = now;
        elapsed = 0;

      } else if (rock.state === 'mixing' && elapsed > 2100) {
        rock.state = 'forming';
        rock.stateStart = now;
        elapsed = 0;  // ← prevents stale elapsed making p=2 on transition frame
        // Assign wide sand-surface source positions so particles visibly travel
        const spread = rock.type === 'med' ? 28 : rock.type === 'small' ? 20 : 13;
        const midX   = rock.x + s[0].length * S * 0.5;
        const baseY  = rock.y + s.length * S;
        for (const pt of rock.particles) {
          pt.fx = midX + (Math.random() - 0.5) * spread * S;
          pt.fy = baseY + Math.random() * S;
        }

      } else if (rock.state === 'forming' && elapsed > 1050) {
        rock.state = 'solid';
        rock.particles = [];
      }

      if (rock.state === 'solid') {
        // ── Normal draw ──
        ctx.globalAlpha = 1;
        for (let py = 0; py < s.length; py++) {
          for (let px = 0; px < s[py].length; px++) {
            const ch = s[py][px]; if (ch === '.') continue;
            setFill(ch === 'L' ? '#857968' : ch === 'M' ? '#5C5042' : '#3A3024');

        }

        const p    = Math.min(1, elapsed / 420);
        const ease = p * (2 - p);
        for (const pt of rock.particles) {
          const px = pt.ox + (pt.sx - pt.ox) * ease;
          const py = pt.oy + (pt.sy - pt.oy) * ease - Math.sin(p * Math.PI) * pt.arcH;
          ctx.globalAlpha = 1;
          setFill(pt.col);
          ctx.fillRect(Math.floor(px), Math.floor(py), S, S);
        }

      } else if (rock.state === 'mixing') {
        // ── Rock colour cross-fades to sand, then vanishes ──
        const p      = Math.min(1, elapsed / 2100);
        const colorT = Math.min(1, p / 0.55);
        const fadeA  = p > 0.55 ? 1 - (p - 0.55) / 0.45 : 1;
        const baseA  = 0.88 * fadeA;
        for (const pt of rock.particles) {
          if (colorT < 1) {
            ctx.globalAlpha = baseA * (1 - colorT);
            setFill(pt.col);
            ctx.fillRect(Math.floor(pt.sx), Math.floor(pt.sy), S, S);
          }
          if (colorT > 0) {
            ctx.globalAlpha = baseA * colorT;
            setFill('#C2946E');
            ctx.fillRect(Math.floor(pt.sx), Math.floor(pt.sy), S, S);
          }
        }

      } else if (rock.state === 'forming') {
        // ── Sand grains appear at surface, fly inward, solidify into rock ──
        // Phase A (lp 0–0.20): grain appears fully at fx,fy (sand colour, full alpha)
        // Phase B (lp 0.20–1): grain travels from fx,fy → ox,oy
        // Phase C (flyP 0.55–1): colour cross-fades sand → rock
        const p = Math.min(1, elapsed / 1050);

        for (let i = 0; i < rock.particles.length; i++) {
          const pt      = rock.particles[i];
          const stagger = (i % 4) * 0.05;                       // 0 … 0.15 stagger
          const lp      = Math.max(0, (p - stagger) / (1 - stagger));
          const alphaIn = Math.min(1, lp / 0.20);               // 0→1 during appear phase
          const flyP    = Math.max(0, (lp - 0.20) / 0.80);      // 0→1 during travel phase
          const ease    = flyP * (2 - flyP);                     // ease-out travel

          const px = pt.fx + (pt.ox - pt.fx) * ease;
          const py = pt.fy + (pt.oy - pt.fy) * ease;

          const colorT = Math.max(0, (flyP - 0.55) / 0.45);     // sand→rock in last 45% of travel

          if (colorT < 1) {
            ctx.globalAlpha = alphaIn * (1 - colorT);
            setFill('#C2946E');
            ctx.fillRect(Math.floor(px), Math.floor(py), S, S);
          }
          if (colorT > 0) {
            ctx.globalAlpha = alphaIn * colorT;
            setFill(pt.col);
            ctx.fillRect(Math.floor(px), Math.floor(py), S, S);
          }

    }
  }
  // ── Ground shadows cast away from the sun (day) / moon (night) ──

    ctx.globalAlpha = 0.30 * strength;
    setFill(night ? '#0A0C1E' : '#503028');

      const dir = x + w / 2 >= lightX ? 1 : -1;
      const len = Math.max(2, Math.round(w / S));
      for (let k = 0; k < len; k++) {
        const px = dir > 0 ? x + w + k * S : x - S - k * S;

        const density = (1 - k / len) * 0.7;

  const crabs = [
    {x: 60*S, y: 124*S, dir: 1, frame: 0, moveC: 0, speed: 14, minX: 50*S, maxX: 72*S, digging: false, digStart: 0},
    {x: 118*S, y: 131*S, dir: -1, frame: 0, moveC: 7, speed: 12, minX: 100*S, maxX: 135*S, digging: false, digStart: 0},

  function updateCrabs() {
    for (const c of crabs) {
      if (c.digging) continue; // frozen while underground
      c.moveC++;
      if (c.moveC >= c.speed) {
        c.x += c.dir * S; c.moveC = 0; c.frame = 1 - c.frame;
        if (c.x <= c.minX) c.dir = 1; else if (c.x >= c.maxX) c.dir = -1;

  function drawCrabs() {
    const now = performance.now();
    for (const c of crabs) {
      if (!c.digging) {
        // Normal draw
        const x = c.x, y = c.y;
        setFill('#8C201A'); ctx.fillRect(x+S, y, S, S); ctx.fillRect(x+3*S, y, S, S);
        setFill('#C44434'); ctx.fillRect(x+2*S, y, S, S); ctx.fillRect(x, y+S, 5*S, S);

        else { ctx.fillRect(x+S, y+2*S, S, S); ctx.fillRect(x+3*S, y+2*S, S, S); }

      if (elapsed < 380) {
        yOff = Math.floor((elapsed / 380) * 3 * S);
      } else if (elapsed < 1000) {
        yOff = 3 * S;
      } else if (elapsed < 1400) {
        yOff = Math.floor((1 - (elapsed - 1000) / 400) * 3 * S);
      } else {
        c.digging = false;
        yOff = 0;
      }

      // Sand-puff: scattered pixels at dig site during entry/exit
      if (yOff > 0) {
        const peak = Math.min(yOff, 3*S - yOff) / (1.5 * S); // 0→1→0
        const sandCol = nightLevel > 0.5 ? '#6A6776' : '#C99478';
        setFill(sandCol);
        if (peak > 0.15 && TH(c.y - S, c.x + S)   < peak * 0.6) ctx.fillRect(c.x + S,   c.y - S, S, S);
        if (peak > 0.15 && TH(c.y - S, c.x + 3*S) < peak * 0.5) ctx.fillRect(c.x + 3*S, c.y - S, S, S);
        if (peak > 0.25 && TH(c.y,    c.x - S)    < peak * 0.4) ctx.fillRect(c.x - S,   c.y,     S, S);
        if (peak > 0.25 && TH(c.y,    c.x + 5*S)  < peak * 0.4) ctx.fillRect(c.x + 5*S, c.y,     S, S);
      }

      // Clip draw: shrink visible portion as crab sinks below sand surface
      const clipH = Math.max(0, 3 * S - yOff);

        ctx.save();
        ctx.beginPath();
        ctx.rect(c.x - S, c.y, 7 * S, clipH);
        ctx.clip();
        const x = c.x, y = c.y + yOff;
        setFill('#8C201A'); ctx.fillRect(x+S, y, S, S); ctx.fillRect(x+3*S, y, S, S);
        setFill('#C44434'); ctx.fillRect(x+2*S, y, S, S); ctx.fillRect(x, y+S, 5*S, S);
        setFill('#A02C24'); ctx.fillRect(x, y+S, S, S); ctx.fillRect(x+4*S, y+S, S, S);
        setFill('#8C201A');
        if (c.frame === 0) { ctx.fillRect(x, y+2*S, S, S); ctx.fillRect(x+2*S, y+2*S, S, S); ctx.fillRect(x+4*S, y+2*S, S, S); }
        else { ctx.fillRect(x+S, y+2*S, S, S); ctx.fillRect(x+3*S, y+2*S, S, S); }

  // ── Birds (persistent for tap interaction) ──

  function updateSharks() {
    const now = performance.now();

  function drawSharks() {
    const now = performance.now();

      let fh; // visible fin rows (0..4)
      if (elapsed < 250) fh = Math.ceil((elapsed / 250) * 4);

      const yWob = Math.floor(Math.sin(elapsed * 0.003) * 0.5 * S);
      const y = Math.floor(s.y + yWob);
      const d = s.dir; // +1 right, -1 left

      // Fin palette (adapts to day/night)
      const dk  = nightLevel > 0.5 ? '#060A18' : '#141418';
      const mid = nightLevel > 0.5 ? '#101828' : '#222230';
      const hi  = nightLevel > 0.5 ? '#1C2438' : '#343444';

      // Compact dorsal fin — 4 rows tall, widens toward base, leans in swim dir
      //  Row 3 (tip):  1 px
      //  Row 2:        2 px
      //  Row 1:        3 px
      //  Row 0 (base): 4 px
      const px = (ox, oy, c) => { setFill(c); ctx.fillRect(x + ox * S, y - oy * S, S, S); };
      const od = d > 0 ? 1 : 0;

      if (fh >= 4) px(od, 3, dk);
      if (fh >= 3) { px(od, 2, dk); px(od + 1, 2, mid); }
      if (fh >= 2) { px(od - 1, 1, dk); px(od, 1, mid); px(od + 1, 1, hi); }
      if (fh >= 1) { px(od - 1, 0, dk); px(od, 0, dk); px(od + 1, 0, mid); px(od + 2, 0, hi); }

      // Small wake behind fin
      if (fh >= 2) {
        setFill(nightLevel > 0.5 ? '#304664' : '#D8EFF8');
        const wx = x - d * 3 * S;
        if (wx >= 0 && wx < W) ctx.fillRect(wx, y, S, S);
        if (fh >= 3) {
          const wx2 = x - d * 5 * S;
          if (wx2 >= 0 && wx2 < W && TH(y, wx2) < 0.35) ctx.fillRect(wx2, y, S, S);
        }
      }
    }
  }

  const particles = [];
  for (let i = 0; i < 12*S; i++) {
    particles.push({ x: Math.random()*W, y: 116*S + Math.random()*22*S, vx: (Math.random()-0.5)*0.15*S, vy: (-0.02+Math.random()*0.04)*S, age: Math.random()*100, maxAge: 80+Math.random()*60, sw: Math.random()*6.28 });
  }
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx + Math.sin(t * 0.04 + p.sw) * 0.05 * S;
      p.y += p.vy; p.age++;
      if (p.age > p.maxAge || p.x < 0 || p.x > W || p.y < 115*S || p.y > 138*S) {
        p.x = Math.random()*W; p.y = 116*S + Math.random()*22*S;
        p.vx = (Math.random()-0.5)*0.15*S; p.vy = (-0.02+Math.random()*0.04)*S;
        p.age = 0; p.maxAge = 80+Math.random()*60; p.sw = Math.random()*6.28;
      }
    }
  }
  function drawParticles() {
    for (const p of particles) {
      const lr = p.age / p.maxAge;
      let alpha;
      if (lr < 0.15) alpha = lr / 0.15;
      else if (lr > 0.85) alpha = (1 - lr) / 0.15;
      else alpha = 1;
      if (alpha < 0.3) continue;
      let col;
      if (alpha > 0.7) col = '#FFEDD8';
      else if (alpha > 0.4) col = '#F0D8B8';
      else col = '#D0B898';
      setFill(col);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), S, S);
    }
  }

  function drawStars(alpha) {
    if (alpha <= 0.02) return;
    ctx.globalAlpha = alpha;
    for (const s of stars) {
      const tw = 0.65 + 0.35 * Math.sin(t * s.twinkSpeed + s.twinkPhase);
      const b = s.bright * tw;
      let col;
      if (b > 0.85) col = '#FFFFFF';
      else if (b > 0.62) col = '#E0E2FF';
      else if (b > 0.42) col = '#A0A4D0';
      else if (b > 0.22) col = '#6868A0';
      else continue;
      setFill(col);
      ctx.fillRect(s.x, s.y, 1, 1);
      if (b > 0.92 && s.bright > 0.75) {
        setFill('#9090C0');
        ctx.fillRect(s.x - 1, s.y, 1, 1);
        ctx.fillRect(s.x + 1, s.y, 1, 1);
        ctx.fillRect(s.x, s.y - 1, 1, 1);
        ctx.fillRect(s.x, s.y + 1, 1, 1);
      }
    }
    ctx.globalAlpha = 1;
  }

  // ── Constellations (sky double-tap, night only) ──
  const CONSTELLATIONS = [
    {
      name: 'Cassiopeia',
      stars: [[20,14],[30,7],[42,11],[52,7],[62,14]].map(([x,y]) => [x*S, y*S]),
      lines: [[0,1],[1,2],[2,3],[3,4]]
    },
    {
      name: 'Orion',
      stars: [
        [100,5],[92,14],[108,13],
        [97,24],[103,23],[109,22],
        [90,38],[110,36]
      ].map(([x,y]) => [x*S, y*S]),
      lines: [[0,1],[0,2],[1,3],[2,5],[3,4],[4,5],[3,6],[5,7]]
    },
    {
      name: 'Big Dipper',
      stars: [
        [216,6],[218,17],[226,18],[224,7],
        [231,4],[236,10],[237,18]
      ].map(([x,y]) => [x*S, y*S]),
      lines: [[0,1],[1,2],[2,3],[3,0],[3,4],[4,5],[5,6]]
    }
  ];
  const constState = CONSTELLATIONS.map(() => ({ active:false, activeStart:0, lastTap:0 }));

  function drawConstellations(alpha) {
    if (alpha < 0.05) return;
    const now = performance.now();
    for (let ci = 0; ci < CONSTELLATIONS.length; ci++) {
      const cs = constState[ci];
      if (!cs.active) continue;
      const elapsed = now - cs.activeStart;
      let fa;
      if      (elapsed < 800)  fa = elapsed / 800;
      else if (elapsed < 5800) fa = 1;
      else if (elapsed < 6600) fa = 1 - (elapsed - 5800) / 800;
      else { cs.active = false; continue; }
      const effA = alpha * fa;
      if (effA < 0.02) continue;
      const cn = CONSTELLATIONS[ci];
      // Twinkle on the hold phase
      const twinkle = elapsed > 800 && elapsed < 5800
        ? 0.88 + 0.12 * Math.sin(now * 0.0025 + ci * 1.7) : 1;
      ctx.save();
      ctx.lineCap = 'round';
      for (const [a, b] of cn.lines) {
        const [x1, y1] = cn.stars[a], [x2, y2] = cn.stars[b];
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.globalAlpha = effA * 0.10 * twinkle; ctx.strokeStyle = '#88BBFF'; ctx.lineWidth = 6; ctx.stroke();
        ctx.globalAlpha = effA * 0.22 * twinkle; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.globalAlpha = effA * 0.60 * twinkle; ctx.strokeStyle = '#CCE8FF'; ctx.lineWidth = 1; ctx.stroke();
      }
      for (const [sx, sy] of cn.stars) {
        // Outer glow
        ctx.beginPath(); ctx.arc(sx, sy, 4.5, 0, Math.PI * 2);
        ctx.globalAlpha = effA * 0.18 * twinkle; ctx.fillStyle = '#88CCFF'; ctx.fill();
        // Core star
        ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.globalAlpha = effA * 0.90 * twinkle; ctx.fillStyle = '#EEF8FF'; ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1; _curFill = null;
    }
  }

  function drawJellies(alpha) {
    jellyLights.length = 0;
    if (alpha <= 0.02) return;
    const cycle = W + JM * 2;
    const baseAlpha = alpha * 0.65;

    for (let ji = 0; ji < jellies.length; ji++) {
      const j = jellies[ji];

      // ── Horizontal drift (wraps around canvas) ──
      const bx = ((t * j.swimSX + j.phaseX) % cycle + cycle) % cycle - JM;

      // ── Depth cycle: periodically dives deep, fading & sinking ──
      const depthRaw   = Math.sin(t * j.depthRate + j.depthPhase);
      const depthCycle = Math.max(0, depthRaw);           // 0=surface, 1=deep
      const depthAlpha = 1 - Math.pow(depthCycle, 1.6);   // fade as they sink
      if (depthAlpha < 0.03) continue;
      const depthY = depthCycle * 9 * S;                  // sink with depth

      const yOff = Math.sin(t * 0.014 + j.phase) * 3 * S;
      const xOff = Math.sin(t * 0.011 + j.phase * 1.3) * 2 * S;
      // ── Smooth hover ease-in / ease-out ──
      const hTarget = (ji === jellyHoverIdx) ? 1 : 0;
      jellyHoverT[ji] += (hTarget - jellyHoverT[ji]) * (hTarget > jellyHoverT[ji] ? 0.10 : 0.06);
      const hT = jellyHoverT[ji]; // 0 = idle, 1 = fully hovered

      const pulse = 0.7 + 0.30 * Math.sin(t * 0.04 + j.phase)
                  + hT * 0.15 * Math.sin(t * 0.06 + j.phase);

      const x = Math.floor(bx + xOff);
      const y = Math.floor(j.baseY + yOff + depthY);
      const effAlpha = baseAlpha * depthAlpha;

      // ── Colour palette ──
      let G, H, Cc, T, Halo;
      if      (j.color === 'cyan')   { G='#60D8C0'; H='#80F0D8'; Cc='#A8FFEC'; T='#60D8C0'; Halo='#388A78'; }
      else if (j.color === 'teal')   { G='#5078B8'; H='#70A0D0'; Cc='#A0D8F0'; T='#5078B8'; Halo='#28507A'; }
      else if (j.color === 'purple') { G='#6858C8'; H='#8878E0'; Cc='#AAAAFF'; T='#6858C8'; Halo='#322870'; }
      else                           { G='#B05888'; H='#D078A8'; Cc='#F0A0CC'; T='#B05888'; Halo='#601840'; }

      // ── Inner halo (smoothly expands and brightens on hover) ──
      const haloBase = j.size === 'large' ? 7*S : j.size === 'tiny' ? 3*S : 5*S;
      const haloR = Math.round(haloBase + hT * (9*S - haloBase));
      jellyLights.push({ x, y, r: haloR * 2.8, rgb: JELLY_LIGHT_RGB[j.color], a: effAlpha * pulse * (0.55 + hT * 0.55) });
      const glowPow = 0.55 + hT * 0.17;
      ctx.globalAlpha = effAlpha * (0.85 + hT * 0.25);
      setFill(Halo);
      for (let dy = -haloR; dy <= haloR; dy++) {
        for (let dx = -haloR - 1; dx <= haloR + 1; dx++) {
          const dd = Math.sqrt(dx*dx + dy*dy*1.4) / haloR;
          if (dd > 1.1) continue;
          const intensity = (1 - dd) * pulse * glowPow;
          const ay = y + dy, ax = x + dx;
          if (ay < 60*S || ay >= 96*S || ax < 0 || ax >= W) continue;
          if (intensity > TH(ay, ax) * 1.15) ctx.fillRect(ax, ay, 1, 1);
        }
      }

      // ── Outer aura ring (fades in and out with hover) ──
      if (hT > 0.01) {
        const auraR = 16*S;
        const auraCol = j.color==='cyan' ? '#1A5040' : j.color==='teal' ? '#102848'
                      : j.color==='purple' ? '#1A0840' : '#480C24';
        setFill(auraCol);
        ctx.globalAlpha = effAlpha * 0.50 * hT;
        for (let dy = -auraR; dy <= auraR; dy++) {
          for (let dx = -auraR - 2; dx <= auraR + 2; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.4) / auraR;
            if (dd < 0.72 || dd > 1.08) continue;
            const intensity = (1 - Math.abs(dd - 0.90) / 0.18) * pulse * 0.38;
            const ay = y + dy, ax = x + dx;
            if (ay < 60*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.2) ctx.fillRect(ax, ay, 1, 1);
          }
        }
      }

      // ── Bell body & tentacles by size ──
      ctx.globalAlpha = effAlpha * (1 + hT * 0.15);

      if (j.size === 'tiny') {
        // 3-wide dome: [H Cc H] on top, [. G .] below
        setFill(H);  ctx.fillRect(x - S, y - S, S, S); ctx.fillRect(x + S, y - S, S, S);
        setFill(Cc); ctx.fillRect(x,     y - S, S, S);
        setFill(G);  ctx.fillRect(x,     y,     S, S);
        setFill(T);
        const sw = Math.round(Math.sin(t * 0.04 + j.phase) * 0.6);
        ctx.fillRect(x + sw*S, y + S, S, S);

      } else if (j.size === 'small') {
        // 5-wide dome
        const bellMap = ['.GHG.', 'GHCHG', '.HHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px]; if (ch === '.') continue;
            setFill(ch === 'G' ? G : ch === 'H' ? H : Cc);
            ctx.fillRect(x + (px-2)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentR = [[0,2,4],[1,3],[2]];
        for (let row = 0; row < tentR.length; row++) {
          const sway = Math.round(Math.sin(t * 0.03 + j.phase + row * 0.6) * 0.7);
          for (const bc of tentR[row]) ctx.fillRect(x + (bc + sway - 2)*S, y + (2+row)*S, S, S);
        }

      } else {
        // 7-wide dome (large)
        const bellMap = ['..GHG..', '.GHHHG.', 'GHHCHHG', '.HHHHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px]; if (ch === '.') continue;
            setFill(ch === 'G' ? G : ch === 'H' ? H : Cc);
            ctx.fillRect(x + (px-3)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentL = [[1,3,5],[0,2,4,6],[1,3,5],[2,4],[3]];
        for (let row = 0; row < tentL.length; row++) {
          const sway = Math.round(Math.sin(t * 0.025 + j.phase + row * 0.5) * 1.0);
          for (const bc of tentL[row]) ctx.fillRect(x + (bc + sway - 3)*S, y + (3+row)*S, S, S);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function updateMiniJellies() {
    const now = performance.now();
    for (let i = miniJellies.length - 1; i >= 0; i--) {
      const m = miniJellies[i];
      if (now - m.birth >= m.life) { miniJellies.splice(i, 1); continue; }
      m.x += m.vx;
      m.y += m.vy;
      if (m.y < 63*S || m.y > 92*S) m.vy = -m.vy;
      if (m.x < 2 || m.x > W - 2) m.vx = -m.vx;
    }
  }

  function drawMiniJellies(alpha) {
    if (alpha <= 0.02 || miniJellies.length === 0) return;
    const now = performance.now();
    for (const m of miniJellies) {
      const age = now - m.birth;
      if (age >= m.life) continue;
      let fade;
      if (age < 600) fade = age / 600;
      else if (age > m.life - 600) fade = (m.life - age) / 600;
      else fade = 1;
      if (fade < 0.03) continue;

      const yWob = Math.sin(t * 0.018 + m.phase) * 1.5 * S;
      const xWob = Math.sin(t * 0.013 + m.phase * 1.4) * 0.8 * S;
      const x = Math.floor(m.x + xWob);
      const y = Math.floor(m.y + yWob);
      if (y < 61*S || y >= 96*S || x < 2 || x >= W - 2) continue;

      let G, H, Cc, T, Halo;
      if (m.color === 'cyan') { G = '#60D8C0'; H = '#80F0D8'; Cc = '#A8FFEC'; T = '#60D8C0'; Halo = '#388A78'; }
      else { G = '#5078B8'; H = '#70A0D0'; Cc = '#A0D8F0'; T = '#5078B8'; Halo = '#28507A'; }
      const pulse = 0.7 + 0.3 * Math.sin(t * 0.05 + m.phase);

      if (m.tiny) {
        // Tiny jelly: 3-pixel bell
        const haloR = 3 * S;
        ctx.globalAlpha = alpha * fade * 0.52;
        setFill(Halo);
        for (let dy = -haloR; dy <= haloR; dy++) {
          for (let dx = -haloR; dx <= haloR; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.3) / haloR;
            if (dd > 1.0) continue;
            const intensity = (1 - dd) * pulse * 0.42;
            const ay = y + dy, ax = x + dx;
            if (ay < 61*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.1) ctx.fillRect(ax, ay, 1, 1);
          }
        }
        ctx.globalAlpha = alpha * fade * 0.62;
        setFill(H); ctx.fillRect(x - S, y, S, S); ctx.fillRect(x + S, y, S, S);
        setFill(Cc); ctx.fillRect(x, y, S, S);
        setFill(G); ctx.fillRect(x, y + S, S, S);
        setFill(T);
        const sw = Math.round(Math.sin(t * 0.04 + m.phase) * 0.5);
        ctx.fillRect(x + sw*S, y + 2*S, S, S);
      } else {
        // Small jelly: full bell map, same proportions as main
        const haloR = 4 * S;
        ctx.globalAlpha = alpha * fade * 0.55;
        setFill(Halo);
        for (let dy = -haloR; dy <= haloR; dy++) {
          for (let dx = -haloR - 1; dx <= haloR + 1; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.4) / haloR;
            if (dd > 1.1) continue;
            const intensity = (1 - dd) * pulse * 0.46;
            const ay = y + dy, ax = x + dx;
            if (ay < 61*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.15) ctx.fillRect(ax, ay, 1, 1);
          }
        }
        ctx.globalAlpha = alpha * fade * 0.68;
        const bellMap = ['.GHG.', 'GHCHG', '.HHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px];
            let col;
            if (ch === 'G') col = G; else if (ch === 'H') col = H;
            else if (ch === 'C') col = Cc; else continue;
            setFill(col);
            ctx.fillRect(x + (px-2)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentacleRows = [[0, 2, 4], [1, 3], [2]];
        for (let row = 0; row < tentacleRows.length; row++) {
          const sway = Math.round(Math.sin(t * 0.03 + m.phase + row * 0.6) * 0.7);
          for (const bc of tentacleRows[row]) {
            ctx.fillRect(x + (bc + sway - 2)*S, y + (2 + row)*S, S, S);
          }
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // ── RTX LIGHTING PASS ──────────────────────────────────────────
  // Post-process layer composited over the finished pixel frame:
  // bloom around emitters, volumetric god rays, water specular,
  // emissive jelly/bio glow, then vignette + colour grade.
  // Rendered at art resolution (1 art pixel = 1 buffer pixel) and
  // upscaled with smoothing off so the glow sits on the pixel grid.
  const lightCanvas = document.createElement('canvas');
  lightCanvas.width = W / S; lightCanvas.height = H / S;
  const lctx = lightCanvas.getContext('2d');

  // Static vignette gradient (built once, reused every frame)
  const vignetteGrad = ctx.createRadialGradient(W/2, H*0.48, H*0.42, W/2, H*0.5, W*0.62);
  vignetteGrad.addColorStop(0, 'rgba(8,6,20,0)');
  vignetteGrad.addColorStop(0.72, 'rgba(8,6,20,0)');
  vignetteGrad.addColorStop(1, 'rgba(8,6,20,0.32)');

  function lightSpot(x, y, r, rgb, a) {
    if (a <= 0.004) return;
    const g = lctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(${rgb},${a})`);
    g.addColorStop(0.5, `rgba(${rgb},${a * 0.35})`);
    g.addColorStop(1, `rgba(${rgb},0)`);
    lctx.fillStyle = g;
    lctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  function drawLighting() {
    const dayL = 1 - nightLevel;
    const breathe = 0.9 + 0.1 * Math.sin(t * 0.012);

    lctx.setTransform(1, 0, 0, 1, 0, 0);
    lctx.clearRect(0, 0, lightCanvas.width, lightCanvas.height);
    lctx.setTransform(1 / S, 0, 0, 1 / S, 0, 0);
    lctx.globalCompositeOperation = 'lighter';

    // ── Sun: bloom + god rays + water specular (day) ──
    if (dayL > 0.02) {
      lightSpot(sunX, sunY, 64*S, '255,214,150', 0.42 * dayL * breathe);
      lightSpot(sunX, sunY, 22*S, '255,240,200', 0.38 * dayL);

      // Volumetric god rays — slowly rotating, individually flickering beams
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * Math.PI * 2 + t * 0.0011 + i * 0.4;
        const flick = 0.5 + 0.5 * Math.sin(t * 0.007 + i * 2.3);
        const len = (52 + 36 * flick) * S;
        const half = 0.05 + 0.05 * flick;
        const rg = lctx.createRadialGradient(sunX, sunY, 4*S, sunX, sunY, len);
        rg.addColorStop(0, `rgba(255,216,160,${0.12 * dayL * flick})`);
        rg.addColorStop(1, 'rgba(255,216,160,0)');
        lctx.fillStyle = rg;
        lctx.beginPath();
        lctx.moveTo(sunX, sunY);
        lctx.lineTo(sunX + Math.cos(ang - half) * len, sunY + Math.sin(ang - half) * len);
        lctx.lineTo(sunX + Math.cos(ang + half) * len, sunY + Math.sin(ang + half) * len);
        lctx.closePath();
        lctx.fill();
      }

      // Specular streak on the water below the sun
      lctx.save();
      lctx.translate(sunX, 80 * S);
      lctx.scale(0.30, 1);
      const sg = lctx.createRadialGradient(0, 0, 0, 0, 0, 34 * S);
      sg.addColorStop(0, `rgba(255,200,130,${0.30 * dayL * breathe})`);
      sg.addColorStop(0.55, `rgba(255,170,110,${0.12 * dayL})`);
      sg.addColorStop(1, 'rgba(255,150,100,0)');
      lctx.fillStyle = sg;
      lctx.fillRect(-34 * S, -34 * S, 68 * S, 68 * S);
      lctx.restore();
    }

    // ── Moon: living glow + moonbeam, jelly & bio emissives (night) ──
    if (nightLevel > 0.02) {
      // Two incommensurate sines → organic, never-repeating shimmer (0..1).
      // The halo also drifts a hair off-centre, like light through moving air.
      const moonPulse = 0.5 + 0.30 * Math.sin(t * 0.017) + 0.20 * Math.sin(t * 0.0093 + 1.7);
      const mgx = moonX + Math.sin(t * 0.006) * 1.2 * S;
      const mgy = moonY + Math.cos(t * 0.0047 + 0.8) * 0.8 * S;
      lightSpot(mgx, mgy, (37 + 6 * moonPulse) * S, '180,205,255', (0.20 + 0.11 * moonPulse) * nightLevel);
      lightSpot(moonX, moonY, 14*S, '230,240,255', (0.21 + 0.08 * moonPulse) * nightLevel);
      // Faint outer corona swelling out of phase with the main halo
      const corona = 0.5 + 0.5 * Math.sin(t * 0.011 + 2.6);
      lightSpot(mgx, mgy, (50 + 9 * corona) * S, '150,180,235', (0.045 + 0.05 * corona) * nightLevel);

      lctx.save();
      // Soft beam glow sways gently with the pixel reflection below it
      lctx.translate(moonX + Math.sin(t * 0.016 + 0.7) * 1.6 * S, 76 * S);
      lctx.scale(0.18, 1);
      const mg = lctx.createRadialGradient(0, 0, 0, 0, 0, 30 * S);
      mg.addColorStop(0, `rgba(190,215,255,${(0.15 + 0.09 * moonPulse) * nightLevel})`);
      mg.addColorStop(1, 'rgba(190,215,255,0)');
      lctx.fillStyle = mg;
      lctx.fillRect(-30 * S, -30 * S, 60 * S, 60 * S);
      lctx.restore();

      // Emissive jellyfish glow (positions captured during drawJellies)
      for (const L of jellyLights) lightSpot(L.x, L.y, L.r, L.rgb, L.a * 0.5 * nightLevel);

      // Bioluminescent sparkle bloom — only the brightest pop
      for (const p of bioluminescent) {
        const twRaw = (Math.sin(t * p.twinkSpeed + p.twinkPhase) + 1) / 2;
        const b = p.baseBright * (0.25 + 0.75 * Math.pow(twRaw, 1.8));
        if (b < 0.6) continue;
        lightSpot(p.x, p.y, 5 * S + b * 4 * S, '120,235,215', (b - 0.6) * 0.5 * nightLevel);
      }
    }

    // ── Fade emitter light out across the surf zone ──
    // Additive glow over the dithered foam blows out into saturated
    // noise, so erase it progressively before the wave band.
    lctx.globalCompositeOperation = 'destination-out';
    const fadeG = lctx.createLinearGradient(0, 90 * S, 0, 110 * S);
    fadeG.addColorStop(0, 'rgba(0,0,0,0)');
    fadeG.addColorStop(1, 'rgba(0,0,0,0.88)');
    lctx.fillStyle = fadeG;
    lctx.fillRect(0, 90 * S, W, H - 90 * S);
    lctx.globalCompositeOperation = 'lighter';

    // ── Ground light: sun warmth / moonlight pooling on the beach ──
    if (dayL > 0.02) {
      lctx.save();
      lctx.translate(sunX, 122 * S);
      lctx.scale(2.4, 0.62);
      const bg = lctx.createRadialGradient(0, 0, 0, 0, 0, 44 * S);
      bg.addColorStop(0, `rgba(255,190,120,${0.20 * dayL * breathe})`);
      bg.addColorStop(0.6, `rgba(255,170,105,${0.09 * dayL})`);
      bg.addColorStop(1, 'rgba(255,160,100,0)');
      lctx.fillStyle = bg;
      lctx.fillRect(-44 * S, -44 * S, 88 * S, 88 * S);
      lctx.restore();
    }
    if (nightLevel > 0.02) {
      lctx.save();
      lctx.translate(moonX, 122 * S);
      lctx.scale(2.4, 0.62);
      const mb = lctx.createRadialGradient(0, 0, 0, 0, 0, 40 * S);
      mb.addColorStop(0, `rgba(165,195,255,${0.15 * nightLevel * breathe})`);
      mb.addColorStop(0.6, `rgba(150,180,255,${0.06 * nightLevel})`);
      mb.addColorStop(1, 'rgba(150,180,255,0)');
      lctx.fillStyle = mb;
      lctx.fillRect(-40 * S, -40 * S, 80 * S, 80 * S);
      lctx.restore();
    }

    // ── Composite light buffer over the scene (pixel-grid upscale) ──
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = rtxLevel;
    ctx.drawImage(lightCanvas, 0, 0, W, H);

    // ── Colour grade: warm push by day, cool push by night ──
    // soft-light keeps mid-tones in gamut (overlay blew out the foam)
    ctx.globalCompositeOperation = 'soft-light';
    if (dayL > 0.02) {
      ctx.globalAlpha = rtxLevel * 0.22 * dayL;
      ctx.fillStyle = '#FF9050';
      ctx.fillRect(0, 0, W, H);
    }
    if (nightLevel > 0.02) {
      ctx.globalAlpha = rtxLevel * 0.25 * nightLevel;
      ctx.fillStyle = '#3050A0';
      ctx.fillRect(0, 0, W, H);
    }

    // ── Vignette ──
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = rtxLevel;
    ctx.fillStyle = vignetteGrad;
    ctx.fillRect(0, 0, W, H);

    ctx.globalAlpha = 1;
    _curFill = null; // resync fillStyle cache after direct ctx.fillStyle writes
  }

  function drawDayNightOverlay(dayCanvas, nightCanvas, y) {
    if (nightLevel === 0) {
      ctx.drawImage(dayCanvas, 0, y);
    } else if (nightLevel === 1) {
      ctx.drawImage(nightCanvas, 0, y);
    } else {
      ctx.drawImage(dayCanvas, 0, y);
      ctx.globalAlpha = nightLevel;
      ctx.drawImage(nightCanvas, 0, y);
      ctx.globalAlpha = 1;
    }
  }

  function draw() {
    if (nightLevel < targetNight) nightLevel = Math.min(targetNight, nightLevel + 0.012);
    else if (nightLevel > targetNight) nightLevel = Math.max(targetNight, nightLevel - 0.012);
    const dayLevel = 1 - nightLevel;

    // --- OPTIMIZED PALETTE COMPUTATION ---
    let foamCur, washCur, wetCur;
    if (nightLevel === 0) {
      foamCur = DAY_FOAM; washCur = DAY_WASH; wetCur = DAY_WET;
    } else if (nightLevel === 1) {
      foamCur = NIGHT_FOAM; washCur = NIGHT_WASH; wetCur = NIGHT_WET;
    } else {
      foamCur = [
        mixParsed(_PD.foam, _PN.foam, nightLevel),
        mixParsed(_PD.foamM, _PN.foamM, nightLevel),
        mixParsed(_PD.foamS, _PN.foamS, nightLevel),
        mixParsed(_PD.foamD, _PN.foamD, nightLevel),
        mixParsed(_PD.foamE, _PN.foamE, nightLevel)
      ];
      washCur = [
        mixParsed(_PD.washW, _PN.washW, nightLevel),
        mixParsed(_PD.washM, _PN.washM, nightLevel),
        mixParsed(_PD.washL, _PN.washL, nightLevel)
      ];
      wetCur = [
        mixParsed(_PD.wetDeep, _PN.wetDeep, nightLevel),
        mixParsed(_PD.wetMid, _PN.wetMid, nightLevel),
        mixParsed(_PD.wetSand, _PN.wetSand, nightLevel),
        mixParsed(_PD.wetDry, _PN.wetDry, nightLevel)
      ];
    }

    // Invalidate fillStyle cache at start of frame (defensive against external state changes)
    _curFill = null;

    drawDayNightOverlay(daySkyCanvas, nightSkyCanvas, 0);

    // ── Living moon: halo breathes by cross-fading between adjacent
    //    pre-rendered sprite sizes — continuous swell, no visible steps.
    //    Static moon body drawn on top ──
    if (nightLevel > 0.02) {
      const mp = Math.max(0, Math.min(1,
        0.5 + 0.30 * Math.sin(t * 0.017) + 0.20 * Math.sin(t * 0.0093 + 1.7)));
      const fIdx = mp * (moonHalos.length - 1);
      const i0 = Math.floor(fIdx);
      const i1 = Math.min(i0 + 1, moonHalos.length - 1);
      const f = fIdx - i0;
      const driftX = Math.sin(t * 0.006) * 1.2 * S;
      const driftY = Math.cos(t * 0.0047 + 0.8) * 0.8 * S;
      const baseA = nightLevel * (0.80 + 0.20 * mp);
      const h0 = moonHalos[i0], h1 = moonHalos[i1];
      ctx.globalAlpha = baseA * (1 - f);
      ctx.drawImage(h0, Math.round(moonX + driftX - h0.width / 2),
                        Math.round(moonY + driftY - h0.height / 2));
      if (f > 0.01 && i1 !== i0) {
        ctx.globalAlpha = baseA * f;
        ctx.drawImage(h1, Math.round(moonX + driftX - h1.width / 2),
                          Math.round(moonY + driftY - h1.height / 2));
      }
      ctx.globalAlpha = nightLevel;
      ctx.drawImage(moonSprite, moonX - (moonSprite.width >> 1), moonY - (moonSprite.height >> 1));
      ctx.globalAlpha = 1;
    }

    drawStars(nightLevel);
    drawConstellations(nightLevel);

    const cloudNow = performance.now();
    function drawCloudLayer(set, alpha) {
      if (alpha <= 0.02) return;
      for (const cl of set) {
        const cycle = W + cl.sprite.width;
        const xx = (((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width;
        const bx = Math.floor(xx);

        // Respawn after full disperse → trigger appear animation
        if (cl.disperseHidden) {
          if (cloudNow >= cl.respawnAt) {
            cl.disperseHidden = false;
            cl.appearing = true;
            cl.appearStart = cloudNow;
          } else continue;
        }

        // ── Appear animation (reverse fog-gather) ──
        if (cl.appearing) {
          const elapsed = cloudNow - cl.appearStart;
          const dur = 950;
          const prog = Math.min(1, elapsed / dur);
          if (prog >= 1) {
            cl.appearing = false;
            // fall through to normal draw below
          } else {
            const ease = prog * (2 - prog); // ease-out
            const spread = (1 - ease) * 14 * S; // wisps start spread, converge inward
            const wisps = [
              { dx: 0,              dy: -(1 - ease) * 4, a: Math.pow(prog, 0.75) },
              { dx:  spread * 0.55, dy: -(1 - ease) * 2, a: Math.pow(prog, 1.4) * 0.65 },
              { dx: -spread * 0.50, dy: -(1 - ease) * 3, a: Math.pow(prog, 1.4) * 0.60 },
              { dx:  spread * 0.20, dy:  (1 - ease) * 3,  a: Math.pow(prog, 2.0) * 0.40 },
            ];
            for (const w of wisps) {
              ctx.globalAlpha = w.a * alpha;
              ctx.drawImage(cl.sprite, bx + w.dx, cl.y + w.dy);
            }
            continue;
          }
        }

        // ── Disperse animation (tap → fog dissolve) ──
        if (!cl.dispersing) {
          ctx.globalAlpha = alpha;
          ctx.drawImage(cl.sprite, bx, cl.y);
        } else {
          const elapsed = cloudNow - cl.disperseStart;
          const dur = 1100;
          const prog = Math.min(1, elapsed / dur);
          if (prog >= 1) {
            cl.dispersing = false;
            cl.disperseHidden = true;
            cl.respawnAt = cloudNow + 6000 + Math.random() * 6000;
            continue;
          }
          // ease-out curve — fast start, slow fade at end
          const ease = prog * (2 - prog);
          const spread = ease * 14 * S;
          const wisps = [
            { dx: 0,              dy: -ease * 4,       a: Math.pow(1 - prog, 0.75) },
            { dx:  spread * 0.55, dy: -ease * 2,       a: Math.pow(1 - prog, 1.4) * 0.65 },
            { dx: -spread * 0.50, dy: -ease * 3,       a: Math.pow(1 - prog, 1.4) * 0.60 },
            { dx:  spread * 0.20, dy:  ease * 3,       a: Math.pow(1 - prog, 2.0) * 0.40 },
          ];
          for (const w of wisps) {
            ctx.globalAlpha = w.a * alpha;
            ctx.drawImage(cl.sprite, bx + w.dx, cl.y + w.dy);
          }
        }
      }
      ctx.globalAlpha = 1;
    }
    drawCloudLayer(dayFogClouds, dayLevel);
    drawCloudLayer(nightFogClouds, nightLevel);
    drawCloudLayer(dayClouds, dayLevel);
    drawCloudLayer(nightClouds, nightLevel);

    const birdNow = performance.now();
    for (const b of birds) {
      if (birdNow < b.boostEnd) {
        b.extraPhase += b.speed * 0.4;
        b.extraFlap += b.flap * 0.5;
      }
      const bx = ((t * b.speed + b.extraPhase + b.phase) % (W + 40*S)) - 20*S;
      const f = Math.floor((t * b.flap + b.extraFlap + b.phase * 0.05) % (b.big ? 3 : 2));
      drawBird(bx, b.base, f, b.big);
    }

    drawDayNightOverlay(dayOceanCanvas, nightOceanCanvas, 60*S);

    // Cloud reflections — use pre-built combined array (no per-frame spread)
    const reflAll = nightLevel > 0.5 ? nightAllClouds : dayAllClouds;
    const reflCol = nightLevel > 0.5 ? '#2A3050' : '#5F567A';
    setFill(reflCol);
    for (const cl of reflAll) {
      if (cl.disperseHidden || cl.dispersing) continue;
      const cycle = W + cl.sprite.width;
      const xx = Math.floor((((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width);
      for (let sx = 0; sx < cl.mask.length; sx++) {
        if (!cl.mask[sx]) continue;
        const baseX = xx + sx;
        for (let dy = 0; dy < 7*S; dy++) {
          const y = 60*S + dy;
          const fade = (7*S - dy) / (7*S);
          const wobble = Math.floor(Math.sin(t * 0.04 + y * 0.3 + baseX * 0.02) * 1.5 * S + Math.sin(t * 0.03 - y * 0.15 + baseX * 0.01) * 0.7 * S);
          const ax = baseX + wobble;
          if (ax < 0 || ax >= W) continue;
          if (Math.abs(ax - sunX) <= 12*S && nightLevel < 0.5) continue;
          if (Math.abs(ax - moonX) <= 4*S && nightLevel > 0.5) continue;
          const density = 0.10 * fade;
          if (density > TH(y, ax)) {
            ctx.fillRect(ax, y, 1, 1);
          }
        }
      }
    }

    if (dayLevel > 0.02) {
      ctx.globalAlpha = dayLevel;
      for (let py = 60*S; py < 67*S; py++) {
        const ratio = (py - 60*S) / (7*S);
        const halfW = Math.floor(6*S * (1 - ratio * 0.15));
        const wobble = Math.floor(Math.sin(t * 0.025 + py * 0.25) * 0.6 * S);
        let col;
        if (py < 62*S) col = '#FFF6CC';
        else if (py < 64*S) col = C.sunCore;
        else if (py < 66*S) col = C.sun;
        else col = '#FBE89E';
        reflectionRow(sunX + wobble, py, halfW, col, 0.4);
      }
      const shimmer = [[69*S,5*S,0.4,'#FBE89E'],[72*S,4*S,2.0,'#F8D6A0'],[75*S,5*S,1.1,'#F8D6A0'],[78*S,3*S,3.5,'#F0C088'],[82*S,4*S,2.6,'#F0C088'],[85*S,3*S,4.8,'#E8AC88'],[89*S,2*S,1.5,'#E8AC88'],[93*S,2*S,3.2,'#D89878']];
      for (const [py, w, phase, col] of shimmer) {
        const wobble = Math.floor(Math.sin(t * 0.035 + phase) * 2 * S);
        const wMod = Math.floor(Math.sin(t * 0.025 + phase * 0.6) * 1.5 * S);
        const halfW = Math.max(S, w + wMod);
        reflectionRow(sunX + wobble, py, halfW, col, 0.5);
        if (Math.sin(t * 0.02 + phase * 1.3) > 0.2) {
          const sx2 = sunX + wobble + halfW + 4*S + Math.floor(Math.sin(phase) * 2 * S);
          if (sx2 >= 0 && sx2 < W) { setFill(col); ctx.fillRect(sx2, py, 1, 1); if (TH(py, sx2 + 1) < 0.3) ctx.fillRect(sx2 + 1, py, 1, 1); }
        }
        if (Math.cos(t * 0.02 + phase * 0.8) > 0.3) {
          const sx2 = sunX + wobble - halfW - 4*S + Math.floor(Math.cos(phase) * 2 * S);
          if (sx2 >= 0 && sx2 < W) { setFill(col); ctx.fillRect(sx2, py, 1, 1); if (TH(py, sx2 - 1) < 0.3) ctx.fillRect(sx2 - 1, py, 1, 1); }
        }
      }
      const glints = [[13*S,67*S],[-12*S,70*S],[14*S,73*S],[-13*S,76*S],[12*S,80*S],[-14*S,83*S],[13*S,86*S],[-11*S,90*S],[10*S,93*S]];
      for (let i = 0; i < glints.length; i++) {
        const [gx, gy] = glints[i];
        const phase = i * 0.91;
        const blink = Math.sin(t * 0.06 + phase);
        if (blink > 0.45) {
          const ax = sunX + gx + Math.floor(Math.sin(t * 0.025 + phase) * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.88 ? '#FFF6CC' : (blink > 0.7 ? C.sun : '#F8D6A0');
            setFill(col); ctx.fillRect(ax, gy, S, S);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    if (nightLevel > 0.02) {
      ctx.globalAlpha = nightLevel;
      for (let py = 60*S; py < 78*S; py++) {
        const ratio = (py - 60*S) / (18*S);
        // Reflection rides the waves: sway is multi-frequency (matching the
        // wave timings) and grows with depth — near-still at the horizon,
        // snaking visibly further down. Width breathes per-row like ripples
        // spreading and gathering the light.
        const sway = (Math.sin(t * 0.020 + py * 0.16) * 0.9
                    + Math.sin(t * 0.012 - py * 0.085 + 1.4) * 0.7)
                    * S * (0.35 + ratio * 1.5);
        const wobble = Math.round(sway);
        const widthPulse = Math.round(Math.sin(t * 0.017 + py * 0.28) * 0.9 * S * ratio);
        const halfW = Math.max(1, Math.floor(2*S * (1 - ratio * 0.5)) + widthPulse);
        let col;
        if (ratio < 0.20) col = '#E8E0C0';
        else if (ratio < 0.50) col = '#A89880';
        else if (ratio < 0.80) col = '#605880';
        else col = '#3A4068';
        setFill(col);
        for (let dx = -halfW - 1; dx <= halfW + 1; dx++) {
          const ax = moonX + dx + wobble;
          if (ax < 0 || ax >= W) continue;
          const intensity = 1 - Math.abs(dx) / (halfW + 1);
          if (intensity > 0.55 || intensity > TH(py, ax) * 0.8) {
            ctx.fillRect(ax, py, 1, 1);
          }
        }
      }
      const moonGlints = [[5*S,68*S],[-4*S,72*S],[6*S,75*S],[-5*S,78*S],[4*S,82*S]];
      for (let i = 0; i < moonGlints.length; i++) {
        const [gx, gy] = moonGlints[i];
        const phase = i * 1.13;
        const blink = Math.sin(t * 0.05 + phase);
        if (blink > 0.5) {
          const ax = moonX + gx + Math.floor(Math.sin(t * 0.02 + phase) * 1.8 * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.85 ? '#E8E0C0' : '#9890A8';
            setFill(col); ctx.fillRect(ax, gy, 1, 1);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    updateBio();
    drawBio(nightLevel);
    drawJellies(nightLevel);
    updateMiniJellies();
    drawMiniJellies(nightLevel);

    const stripes = [
      {y: 68*S, basePeriod: 20*S, dash: 9*S,  scroll: 0.04*S},
      {y: 73*S, basePeriod: 26*S, dash: 13*S, scroll: 0.06*S},
      {y: 80*S, basePeriod: 32*S, dash: 17*S, scroll: 0.08*S},
      {y: 88*S, basePeriod: 40*S, dash: 22*S, scroll: 0.10*S},
      {y: 94*S, basePeriod: 48*S, dash: 28*S, scroll: 0.13*S}
    ];
    for (const s of stripes) {
      const off = Math.floor(t * s.scroll);
      for (let x = 0; x < W; x++) {
        if (Math.abs(x - sunX) <= 8*S && nightLevel < 0.5) continue;
        const absX = x + off;
        const dashIdx = Math.floor(absX / s.basePeriod);
        const lenVar = Math.sin(dashIdx * 2.7 + s.y * 0.15) * 8 * S + Math.cos(dashIdx * 1.3 + s.y * 0.25) * 5 * S;
        const actualDash = Math.max(3*S, Math.min(s.basePeriod - 3*S, s.dash + lenVar));
        const pos = ((absX % s.basePeriod) + s.basePeriod) % s.basePeriod;
        if (pos >= actualDash) continue;
        const visFactor = (Math.sin(dashIdx * 3.7 + s.y * 0.25 + t * 0.004) + 1) / 2;
        const visIntensity = 0.5 + visFactor * 0.5;
        const yWob = Math.round(Math.sin(x * 0.065 + t * 0.025 + s.y * 0.05) * 0.6 * S);
        const dy = s.y + yWob;
        const half = actualDash / 2;
        const dc = Math.abs(pos - half) / half;
        const intensity = (1 - dc) * visIntensity;
        const th = TH(dy, x);
        let col = null;
        if (intensity > 0.72) col = foamCur[0];
        else if (intensity > 0.50) col = foamCur[1];
        else if (intensity > 0.30) col = foamCur[2];
        else if (intensity > 0.15) col = foamCur[3];
        else if (intensity > th * 0.40) col = foamCur[4];
        if (col) { setFill(col); ctx.fillRect(x, dy, 1, 1); }
        if (intensity > 0.35 && TH(dy - 1, x) < 0.18) { setFill(foamCur[2]); ctx.fillRect(x, dy - 1, 1, 1); }
        if (intensity > 0.5 && TH(dy + 1, x + 7) < 0.13) { setFill(foamCur[3]); ctx.fillRect(x, dy + 1, 1, 1); }
      }
    }

    const waveCycle = Math.sin(t * 0.013);
    const advance = waveCycle * 2.0 * S;
    for (let x = 0; x < W; x++) {
      const sTopLarge = Math.sin(x * 0.014 + t * 0.017) * 2.0 * S;
      const sTopExtra = Math.sin(x * 0.0225 - t * 0.011 + 2.1) * 1.2 * S;
      const sTopMid = Math.sin(x * 0.045 + t * 0.022 + 0.6) * 0.8 * S;
      const sTopFine = Math.sin(x * 0.09 - t * 0.015 + 1.3) * 0.4 * S;
      const sTop = sTopLarge + sTopExtra + sTopMid + sTopFine;
      const sBot = Math.sin(x * 0.0225 + t * 0.018) * 1.5 * S + Math.sin(x * 0.055 - t * 0.013) * 0.7 * S;
      let topY = Math.floor(103*S + advance + sTop);
      let botY = Math.floor(110*S + advance + sBot);
      topY = Math.max(95*S, Math.min(109*S, topY));
      botY = Math.max(topY + 2*S, Math.min(114*S, botY));

      const foamHeightN = Math.sin(x * 0.025 + t * 0.013) * 1.6 + Math.sin(x * 0.055 - t * 0.009 + 1.3) * 1.0 + Math.sin(x * 0.105 + t * 0.011 + 2.7) * 0.6;
      const foamMaxRows = Math.max(2*S, Math.min(7*S, Math.floor(4.5*S + foamHeightN*S)));
      for (let dy = 1; dy <= foamMaxRows; dy++) {
        const ty = topY - dy;
        if (ty < 60*S) break;
        const relDepth = (dy - 1) / Math.max(1, foamMaxRows - 1);
        const density = 0.85 - relDepth * 0.70;
        if (density > TH(ty, x)) {
          let col;
          if (relDepth < 0.20) col = foamCur[1];
          else if (relDepth < 0.45) col = foamCur[2];
          else if (relDepth < 0.75) col = foamCur[3];
          else col = foamCur[4];
          setFill(col); ctx.fillRect(x, ty, 1, 1);
        }
      }
      const sprayN1 = Math.sin(x * 0.095 + t * 0.012 + 1.9) * 0.5;
      if (sprayN1 > 0.30) { const sy = topY - foamMaxRows - 1; if (sy >= 60*S && TH(sy, x) < 0.13) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }
      const sprayN2 = Math.sin(x * 0.155 - t * 0.014 + 0.5) * 0.5;
      if (sprayN2 > 0.38) { const sy = topY - foamMaxRows - 2; if (sy >= 60*S && TH(sy, x) < 0.08) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }

      // Pre-compute LUT row base for this x's y-range (saves multiply per pixel)
      // (Skipped — y varies, so we compute per pixel; still cheaper than 6 sin calls)
      for (let y = 96*S; y < SAND_Y; y++) {
        if (y < topY) continue;
        let col;
        if (y === topY) {
          const scallopT = Math.sin(x * 0.055 + t * 0.014 + 0.7) * 0.55 + Math.sin(x * 0.115 - t * 0.009 + 2.4) * 0.35;
          const th = TH(y, x);
          if (scallopT > 0.10) col = foamCur[0];
          else if (scallopT > -0.15) col = (th < 0.45) ? foamCur[0] : foamCur[1];
          else if (scallopT > -0.40) col = (th < 0.35) ? foamCur[1] : foamCur[2];
          else col = (th < 0.3) ? foamCur[3] : washCur[0];
        }
        else if (y < botY) {
          const range = Math.max(1, botY - topY);
          const r2 = (y - topY) / range;
          const washNoise = Math.sin(x * 0.045 + y * 0.075 + t * 0.005) * 0.32 + Math.sin(x * 0.11 - y * 0.06 + 1.7) * 0.22 + Math.sin(x * 0.17 + y * 0.13 + 3.3) * 0.13;
          const cIdx = Math.max(0, Math.min(washCur.length - 1.001, r2 * (washCur.length - 1) + washNoise));
          const idx = Math.floor(cIdx);
          const frac = cIdx - idx;
          const th = TH(y, x);
          col = (frac > th) ? washCur[Math.min(idx + 1, washCur.length - 1)] : washCur[idx];
        }
        else if (y === botY) {
          const scallopN = Math.sin(x * 0.065 + t * 0.012) * 0.55 + Math.sin(x * 0.135 - t * 0.008 + 1.7) * 0.35;
          const th = TH(y, x);
          if (scallopN > 0.15) col = foamCur[0];
          else if (scallopN > -0.10) col = (th < 0.5) ? foamCur[0] : foamCur[2];
          else if (scallopN > -0.35) col = (th < 0.4) ? foamCur[2] : foamCur[3];
          else {
            // LUT lookup replaces sandNoise + macroNoise per pixel
            const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
            const gp = 1.4 + combined * 2.2;
            const clampedGp = Math.max(0, Math.min(3, gp));
            const idx = Math.floor(clampedGp);
            const frac = clampedGp - idx;
            col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
          }
        }
        else {
          // LUT lookup replaces sandNoise + macroNoise per pixel
          const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
          const th = TH(y, x);
          const gp = 1.4 + combined * 2.2;
          const clampedGp = Math.max(0, Math.min(3, gp));
          const idx = Math.floor(clampedGp);
          const frac = clampedGp - idx;
          col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
        }
        setFill(col);
        ctx.fillRect(x, y, 1, 1);
      }
      if (botY > topY + 2*S) { const aN = Math.sin(x * 0.085 + t * 0.012 + 1.3) * 0.5; if (aN > 0.20 && TH(botY - 1, x) < 0.20) { setFill(foamCur[2]); ctx.fillRect(x, botY - 1, 1, 1); } }
      if (botY < 114*S) {
        const bN = Math.sin(x * 0.095 + t * 0.010 + 0.5) * 0.5;
        if (bN > 0.15 && TH(botY + 1, x) < 0.15) { setFill(foamCur[0]); ctx.fillRect(x, botY + 1, 1, 1); }
        if (botY < 113*S) { const cN = Math.sin(x * 0.115 - t * 0.008 + 2.3) * 0.5; if (cN > 0.32 && TH(botY + 2, x) < 0.10) { setFill(foamCur[0]); ctx.fillRect(x, botY + 2, 1, 1); } }
      }
    }

    // Sharks drawn AFTER all ocean stripes/waves so the fin isn't overwritten
    updateSharks();
    drawSharks();

    drawDayNightOverlay(daySandCanvas, nightSandCanvas, SAND_Y);

    drawRocks();
    drawObjectShadows();

    setFill('#6E4F45');
    ctx.fillRect(110*S, 134*S, S, S); ctx.fillRect(170*S, 133*S, 2*S, S);
    ctx.fillRect(60*S, 137*S, S, S); ctx.fillRect(185*S, 136*S, S, S);
    setFill('#F8E4D0');
    ctx.fillRect(95*S, 133*S, 2*S, S); ctx.fillRect(96*S, 134*S, S, S);
    setFill('#D9B498');
    ctx.fillRect(95*S, 134*S, S, S);

    updateCrabs(); drawCrabs();
    updateParticles(); drawParticles();

    drawLighting();

    applyMusicVolume();

    t++;
    requestAnimationFrame(draw);
  }
  // ── Analog noise tile: random grayscale grain rendered once, tiled and
  //    jumped around by CSS so the picture has that ever-boiling TV snow ──
  {
    const nz = document.createElement('canvas');
    nz.width = 160; nz.height = 160;
    const nctx = nz.getContext('2d');
    const img = nctx.createImageData(160, 160);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v;
      img.data[i+3] = Math.random() < 0.55 ? 255 : 0; // sparse grain
    }
    nctx.putImageData(img, 0, 0);
    document.querySelector('.crt-noise').style.backgroundImage = `url(${nz.toDataURL()})`;
  }

  // ── CRT glitch tears: random horizontal colour-split lines that appear,
  //    slip once mid-life, then heal — like a tube momentarily losing sync ──
  const crtOverlayEl = document.getElementById('crtOverlay');
  const glitchStrips = [];
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'crt-glitch';
    crtOverlayEl.appendChild(d);
    glitchStrips.push(d);
  }
  function fireGlitch() {
    const count = 1 + (Math.random() < 0.70 ? 1 : 0) + (Math.random() < 0.40 ? 1 : 0);
    for (let i = 0; i < count; i++) {
      const strip = glitchStrips[i];
      const life = 70 + Math.random() * 180;
      const startY = 4 + Math.random() * 92;
      strip.style.top = startY + '%';
      strip.style.height = (2 + Math.random() * 4).toFixed(0) + 'px';
      strip.style.opacity = (0.30 + Math.random() * 0.40).toFixed(2);
      strip.style.transform =
        'translateX(' + (Math.random() * 16 - 8).toFixed(0) + 'px)' +
        (Math.random() < 0.3 ? ' scaleY(2)' : '');
      // mid-life slip before the tear heals
      setTimeout(() => {
        strip.style.top = (startY + (Math.random() * 6 - 3)) + '%';
        strip.style.transform = 'translateX(' + (Math.random() * 16 - 8).toFixed(0) + 'px)';
      }, life * 0.5);
      setTimeout(() => { strip.style.opacity = '0'; }, life);
    }
    // Rarely the tube also loses stability — pick at most ONE of
    // {horizontal-hold wobble, focus loss} so the two don't fight over
    // the canvas's single animation slot.
    if (!canvas.classList.contains('crt-defocus') && !canvas.classList.contains('sync-wobble')) {
      const r = Math.random();
      if (r < 0.12) {
        canvas.classList.add('sync-wobble');
        setTimeout(() => canvas.classList.remove('sync-wobble'), 180 + Math.random() * 220);
      } else if (r < 0.22) {
        const dur = 2.2 + Math.random() * 1.2;
        canvas.style.setProperty('--defocus-dur', dur.toFixed(2) + 's');
        canvas.classList.add('crt-defocus');
        setTimeout(() => canvas.classList.remove('crt-defocus'), dur * 1000 + 60);
      }
    }
    setTimeout(fireGlitch, 1500 + Math.random() * 4500);
  }
  setTimeout(fireGlitch, 1200 + Math.random() * 2000);

  // ── Chroma band: soft multi-colour line rolls through occasionally,
  //    on its own slower, irregular cadence (rarer than the tears) ──
  const chromaEl = document.createElement('div');
  chromaEl.className = 'crt-chroma';
  crtOverlayEl.appendChild(chromaEl);
  function fireChroma() {
    // Always rolls in from the top
    chromaEl.style.setProperty('--chroma-from', '-16vh');
    chromaEl.style.setProperty('--chroma-to', '114vh');
    chromaEl.style.setProperty('--chroma-dur', (2.0 + Math.random() * 2.2).toFixed(2) + 's');
    chromaEl.style.height = (34 + Math.random() * 40).toFixed(0) + 'px';
    chromaEl.style.filter = 'blur(' + (2.5 + Math.random() * 2).toFixed(1) + 'px) hue-rotate('
      + ((Math.random() * 120 - 60) | 0) + 'deg)';
    chromaEl.classList.remove('run');
    void chromaEl.offsetWidth;       // reflow so the animation restarts
    chromaEl.classList.add('run');
    setTimeout(fireChroma, 7000 + Math.random() * 12000);
  }
  setTimeout(fireChroma, 4000 + Math.random() * 5000);

  draw();
})();
</script></div>
</body>
</html>
